collection_name : agent
persist_directory : chroma_db
k :  3
data_path : data
md5_hex_store : data/md5.txt
allow_knowledge_file_type : ["txt","pdf","docx","xlsx","csv","md","json"]

chunk_size : 200
chunk_overlap : 20
separators : ["\n\n","。",".","?","？","!"," ",""]

# 上下文增强（每个 chunk 调 LLM 生成摘要，加载慢，默认关闭）
contextual_enhancer : false
