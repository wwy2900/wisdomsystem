services:
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_CONNECT_TIMEOUT: "1"
      REDIS_SOCKET_TIMEOUT: "1"
      FRONTEND_ORIGINS: "http://localhost:8080"
      AUTH_COOKIE_SECURE: "false"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
